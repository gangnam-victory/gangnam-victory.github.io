<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#E61E2B" />
  <title>전선영 강남구청장 예비후보</title>

  <!-- OG Tags -->
  <meta property="og:title" content="전선영 강남구청장 예비후보" />
  <meta property="og:description" content="다가오는 50년을 위한 강남의 변화, 전선영이 만듭니다." />
  <meta property="og:image" content="https://gangnam-victory.github.io/assets/1.jpg" />
  <meta property="og:url" content="https://gangnam-victory.github.io/" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #E61E2B;
      --red-dark: #c0181e;
      --black: #111111;
      --white: #ffffff;
      --bg: #f7f7f7;
      --header-h: 52px;
      --tab-h: 62px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Noto Sans KR', sans-serif;
      overscroll-behavior: none;
    }

    /* ── Header ── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: var(--red);
      height: var(--header-h);
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }

    /* 국민의힘 로고 이미지 */
    .header-logo {
      height: 36px;
      width: auto;
      object-fit: contain;
      flex-shrink: 0;
    }

    .header-divider {
      width: 1px;
      height: 18px;
      background: rgba(255,255,255,0.35);
      flex-shrink: 0;
    }

    .header-badge {
      background: var(--white);
      color: var(--red);
      font-size: 10px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 3px;
      white-space: nowrap;
    }

    .header-name {
      color: var(--white);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    /* ── Scroll container ── */
    .content-wrap {
      position: fixed;
      top: var(--header-h);
      bottom: var(--tab-h);
      left: 0; right: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--bg);
    }

    /* ── Panels ── */
    .panel { display: none; }
    .panel.active { display: block; }
    .panel img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ── Bottom Tab Bar ── */
    .tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--tab-h);
      background: var(--black);
      display: flex;
      border-top: 3px solid var(--red);
      z-index: 100;
    }

    .tab-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 3px;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      transition: background 0.12s;
    }

    .tab-btn:active { background: rgba(255,255,255,0.07); }

    /* 비활성: 흰색 큰 글자 */
    .tab-label {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.04em;
      line-height: 1.2;
      text-align: center;
      word-break: keep-all;
      transition: color 0.15s;
      padding: 7px 2px;
      border-radius: 6px;
      width: 92%;
    }

    /* 활성: 빨간 버튼 배경 */
    .tab-btn.active .tab-label {
      background: var(--red);
      color: var(--white);
      font-weight: 900;
    }

    .tab-btn + .tab-btn {
      border-left: 1px solid rgba(255,255,255,0.1);
    }

    /* ── Notch safe area ── */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .tab-bar {
        height: calc(var(--tab-h) + env(safe-area-inset-bottom));
        padding-bottom: env(safe-area-inset-bottom);
      }
      .content-wrap {
        bottom: calc(var(--tab-h) + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <img class="header-logo" src="assets/logo-temp.png" alt="국민의힘" />
    <span class="header-divider"></span>
    <span class="header-badge">강남구청장 예비후보</span>
    <span class="header-name">전선영</span>
  </header>

  <!-- Scroll area -->
  <div class="content-wrap" id="contentWrap">

    <div class="panel active" id="panel-0">
      <img src="assets/1.jpg" alt="프로필" loading="eager" />
    </div>

    <div class="panel" id="panel-1">
      <img src="assets/2.jpg" alt="출마각오" loading="lazy" />
    </div>

    <div class="panel" id="panel-2">
      <img src="assets/3.jpg" alt="주요공약" loading="lazy" />
    </div>

    <div class="panel" id="panel-3">
      <img src="assets/4.jpg" alt="후원안내" loading="lazy" />
    </div>

    <div class="panel" id="panel-4">
      <img src="assets/5.jpg" alt="후보소개" loading="lazy" />
    </div>

  </div>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(0)">
      <span class="tab-label">프로필</span>
    </button>
    <button class="tab-btn" onclick="switchTab(1)">
      <span class="tab-label">출마<br>각오</span>
    </button>
    <button class="tab-btn" onclick="switchTab(2)">
      <span class="tab-label">주요<br>공약</span>
    </button>
    <button class="tab-btn" onclick="switchTab(3)">
      <span class="tab-label">후원<br>안내</span>
    </button>
    <button class="tab-btn" onclick="switchTab(4)">
      <span class="tab-label">후보<br>소개</span>
    </button>
  </nav>

  <script>
    const tabs = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.panel');
    const wrap = document.getElementById('contentWrap');

    function switchTab(idx) {
      tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
      panels.forEach((p, i) => p.classList.toggle('active', i === idx));
      wrap.scrollTop = 0;
    }
  </script>

</body>
</html>
